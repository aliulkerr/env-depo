function getAyRaporu() {
  const aylar = {};
  state.siparisler.forEach(s => {
    const ay = s.tarih ? s.tarih.slice(0,7) : '';
    if (!ay) return;
    if (!aylar[ay]) aylar[ay] = {ciro:0, adet:0};
    aylar[ay].ciro += s.genel || 0;
    aylar[ay].adet++;
  });
  const sorted = Object.entries(aylar).sort((a,b) => b[0].localeCompare(a[0])).slice(0,6);
  if (sorted.length === 0) return '<div class="text-muted text-sm">Veri yok</div>';
  const max = Math.max(...sorted.map(x => x[1].ciro));
  return `<div class="bar-chart">
    ${sorted.map(([ay,d]) => `
      <div class="bar-row">
        <div class="bar-label">${ay}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${max>0?Math.round(d.ciro/max*100):0}%"></div></div>
        <div class="bar-val">${fmtI(d.ciro)}₺</div>
      </div>`).join('')}
  </div>`;
}

// ===== STOK =====
function renderStok() {
  let filtered = state.stok;
  if (state.searchQ) {
    const tokens = state.searchQ.toLowerCase().split(/\s+/).filter(Boolean);
    filtered = filtered.filter(s => {
      const hay = (s.kod + ' ' + s.aciklama).toLowerCase();
      // AND araması önce, yoksa OR
      return tokens.every(t => hay.includes(t)) || tokens.some(t => hay.includes(t));
    });
    // AND öncelikli sıralama
    filtered.sort((a, b) => {
      const hayA = (a.kod + ' ' + a.aciklama).toLowerCase();
      const hayB = (b.kod + ' ' + b.aciklama).toLowerCase();
      const scoreA = tokens.filter(t => hayA.includes(t)).length;
      const scoreB = tokens.filter(t => hayB.includes(t)).length;
      return scoreB - scoreA;
    });
  }
  if (state.filterKat) {
    filtered = filtered.filter(s => s.kategori === state.filterKat);
  }

  const total = filtered.length;
  const pages = Math.ceil(total / state.page_size);
  const start = (state.page_num - 1) * state.page_size;
  const paged = filtered.slice(start, start + state.page_size);

  const canEdit = state.user.rol === 'yonetici' || state.user.rol === 'depocu';

  return `
  <div class="search-bar">
    <input class="search-input" placeholder="🔍 Stok kodu veya açıklama ara..." value="${state.searchQ}" oninput="doSearch(this.value)">
    <select class="search-input" style="width:180px" onchange="doFilterKat(this.value)">
      <option value="">Tüm Kategoriler</option>
      ${KATEGORILER.map(k => `<option value="${k}" ${state.filterKat===k?'selected':''}>${k}</option>`).join('')}
    </select>
    ${canEdit ? `<button class="btn btn-primary" onclick="openAddStok()">+ Ürün Ekle</button>` : ''}
    ${state.user.rol==='yonetici' ? `<button class="btn btn-secondary" onclick="exportStokExcel()">📥 Excel</button>` : ''}
  </div>
  <div class="card">
    <div class="card-title flex justify-between items-center">
      <span>📦 Stok Listesi (${total} ürün)</span>
      <span class="text-sm text-muted">Sayfa ${state.page_num}/${pages}</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Stok Kodu</th><th>Açıklama</th><th>Kategori</th><th>Birim</th>
          <th>Stok</th><th>Min Stok</th><th>Durum</th>
          ${canEdit ? '<th>İşlem</th>' : ''}
        </tr></thead>
        <tbody>
          ${paged.map(s => `<tr>
            <td class="mono" style="font-size:12px">${s.kod}</td>
            <td>${s.aciklama}</td>
            <td><span class="badge badge-gray">${s.kategori||'—'}</span></td>
            <td>${s.birim||'adet'}</td>
            <td class="mono text-right"><b>${fmtI(s.stok)}</b></td>
            <td class="mono text-right">${s.minStok||5}</td>
            <td>${s.stok <= 0 ? '<span class="badge badge-danger">Tükendi</span>' : s.stok <= s.minStok ? '<span class="badge badge-warn">Kritik</span>' : '<span class="badge badge-ok">Yeterli</span>'}</td>
            ${canEdit ? `<td>
              <button class="btn btn-secondary btn-sm btn-icon" onclick="openEditStok(${s.id})" title="Düzenle">✏️</button>
              ${state.user.rol==='yonetici' ? `<button class="btn btn-sm btn-icon" style="color:var(--danger);background:var(--r50);border:1px solid var(--r100)" onclick="delStok(${s.id})" title="Sil">🗑️</button>` : ''}
            </td>` : ''}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button class="page-btn" onclick="setPage(1)">«</button>
      <button class="page-btn" onclick="setPage(${Math.max(1,state.page_num-1)})">‹</button>
      ${Array.from({length:Math.min(5,pages)}, (_,i) => {
        const p = Math.max(1, Math.min(pages-4, state.page_num-2)) + i;
        if (p > pages) return '';
        return `<button class="page-btn${state.page_num===p?' active':''}" onclick="setPage(${p})">${p}</button>`;
      }).join('')}
      <button class="page-btn" onclick="setPage(${Math.min(pages,state.page_num+1)})">›</button>
      <button class="page-btn" onclick="setPage(${pages})">»</button>
    </div>
  </div>`;
}

function renderStokIslem() {
  const girisLog = JSON.parse(localStorage.getItem('env_giris_log') || '[]');

function filterStokDropdown(inputId, listId) {
  const q = document.getElementById(inputId).value.toLowerCase();
  const list = document.getElementById(listId);
  if (q.length < 2) { list.className = 'hidden'; return; }
  const matches = state.stok.filter(s => s.kod.toLowerCase().includes(q) || s.aciklama.toLowerCase().includes(q)).slice(0,10);
  if (matches.length === 0) { list.className = 'hidden'; return; }
  list.className = '';
  list.innerHTML = matches.map(s => `
    <div onclick="selectStokItem(${s.id},'${inputId}','${listId}')" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f4ee" onmouseover="this.style.background='#f8faf6'" onmouseout="this.style.background=''">
      <b>${s.kod}</b> — ${s.aciklama.slice(0,40)} <span style="color:var(--muted)">[${s.stok} ${s.birim||'adet'}]</span>
    </div>`).join('');
}

function selectStokItem(id, inputId, listId) {
  const s = state.stok.find(x => x.id === id);
  if (!s) return;
  document.getElementById(inputId).value = s.kod + ' — ' + s.aciklama;
  document.getElementById(listId).className = 'hidden';
  document.getElementById('g-stok-id').value = id;
  const secili = document.getElementById('g-secili');
  if (secili) { secili.className = 'alert alert-success'; secili.textContent = `Seçildi: ${s.aciklama} | Mevcut stok: ${s.stok} ${s.birim||'adet'}`; }
}

function doGiris() {
  const id = parseInt(document.getElementById('g-stok-id').value);
  const miktar = parseFloat(document.getElementById('g-miktar').value);
  if (!id || !miktar || miktar <= 0) { alert('Lütfen ürün seçin ve geçerli miktar girin.'); return; }
  const s = state.stok.find(x => x.id === id);
  if (!s) return;
  s.stok = (s.stok || 0) + miktar;
  const log = JSON.parse(localStorage.getItem('env_giris_log') || '[]');
  log.push({
    tarih: document.getElementById('g-tarih').value,
    stokId: id, kod: s.kod, aciklama: s.aciklama, birim: s.birim||'adet',
    miktar, tedarikci: document.getElementById('g-tedarikci').value,
    fatura: document.getElementById('g-fatura').value,
    not: document.getElementById('g-not').value,
    personel: state.user.ad,
  });
  localStorage.setItem('env_giris_log', JSON.stringify(log));
  save();
  alert(`✅ ${s.aciklama}\n${miktar} adet giriş yapıldı. Yeni stok: ${s.stok}`);
  render();
}

function exportHareketExcel() {
  const girisLog = JSON.parse(localStorage.getItem('env_giris_log') || '[]');
  const cikisLog = JSON.parse(localStorage.getItem('env_cikis_log') || '[]');
  const rows = [['Tarih','Tür','Stok Kodu','Ürün Açıklaması','Miktar','Birim','Tedarikçi/Müşteri','Fatura/Sipariş No','Personel']];
  [...girisLog.map(l=>({...l,tur:'Giriş'})), ...cikisLog.map(l=>({...l,tur:'Çıkış'}))]
    .sort((a,b) => (b.tarih||'').localeCompare(a.tarih||''))
    .forEach(l => rows.push([l.tarih||'', l.tur, l.kod||'', l.aciklama||'', l.miktar||0, l.birim||'', l.tedarikci||l.musteri||'', l.fatura||l.sipNo||'', l.personel||'']));
  downloadXLSX(rows, 'ENV_StokHareket_' + today() + '.xlsx');
}

    <div style="position:relative">
      <input type="text" class="sh-kalem-aciklama" placeholder="Ürün ara..." oninput="filterSahaStok(${i})" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px">

function addSahaKalem() {
  const cont = document.getElementById('sh-kalemler');
  const div = document.createElement('div');
  div.innerHTML = renderSahaKalemRow(sahaKalemCount++);
  cont.appendChild(div.firstElementChild);
}

function removeSahaKalem(i) {
  const el = document.getElementById('sh-kalem-'+i);
  if (el) el.remove();
}

function filterSahaStok(i) {
  const input = document.querySelector(`#sh-kalem-${i} .sh-kalem-aciklama`);
  const q = input.value.trim();
  const drop = document.getElementById('sh-kdrop-'+i);
  if (q.length < 1) { drop.className = 'hidden'; return; }

  // Seçili kategori filtresi
  const katSel = document.getElementById('sh-kat-filter')?.value || '';

  // Akıllı arama: tüm kelimelerin geçip geçmediğini kontrol et
  const tokens = q.toLowerCase().split(/\s+/).filter(Boolean);

  let results = state.stok.filter(s => {
    const hay = (s.kod + ' ' + s.aciklama).toLowerCase();
    return tokens.every(t => hay.includes(t));
  });

  // Kategori filtresi uygula
  if (katSel) results = results.filter(s => s.kategori === katSel);

  // Sonuç yoksa tek kelime bazlı OR araması yap
  if (results.length === 0 && tokens.length > 1) {
    results = state.stok.filter(s => {
      const hay = (s.kod + ' ' + s.aciklama).toLowerCase();
      return tokens.some(t => hay.includes(t));
    });
    if (katSel) results = results.filter(s => s.kategori === katSel);
  }

  results = results.slice(0, 12);
  if (results.length === 0) { drop.className = 'hidden'; return; }
  drop.className = '';
  drop.innerHTML = results.map(s => `
    <div onclick="selectSahaStok(${i},${s.id})" style="padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f4ee" onmouseover="this.style.background='#f8faf6'" onmouseout="this.style.background=''">
      <span style="color:var(--muted);font-size:10px">${s.kategori||''} &nbsp;·&nbsp;</span>
      <b>${s.kod}</b> — ${s.aciklama.slice(0,50)}
      <span style="color:var(--g600);font-size:11px;float:right">${s.stok} ${s.birim||'adet'}</span>
    </div>`).join('');
}

function selectSahaStok(i, stokId) {
  const s = state.stok.find(x => x.id === stokId);
  if (!s) return;
  const row = document.getElementById('sh-kalem-'+i);
  row.querySelector('.sh-kalem-aciklama').value = s.aciklama;
  row.querySelector('.sh-kalem-aciklama').dataset.stokId = stokId;
  row.querySelector('.sh-kalem-aciklama').dataset.kod = s.kod;
  const birimSel = row.querySelector('.sh-kalem-birim');
  if (s.birim) birimSel.value = s.birim;
  document.getElementById('sh-kdrop-'+i).className = 'hidden';
}

function filterSahaCari() {
  const q = document.getElementById('sh-musteri').value.toLowerCase();
  const drop = document.getElementById('sh-cari-drop');
  if (!drop || q.length < 1) { if(drop) drop.className = 'hidden'; return; }
  const matches = state.cariler.filter(c => c.firma.toLowerCase().includes(q)).slice(0,6);
  if (matches.length === 0) { drop.className = 'hidden'; return; }
  drop.className = '';
  drop.innerHTML = matches.map(c => `
    <div onclick="selectSahaCari('${c.firma.replace(/'/g,"\\'")}','${(c.tip||'Bireysel')}')" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f4ee" onmouseover="this.style.background='#f8faf6'" onmouseout="this.style.background=''">
      <b>${c.firma}</b> <span style="color:var(--muted)">${c.tip||''}</span>
    </div>`).join('');
}

function selectSahaCari(firma, tip) {
  document.getElementById('sh-musteri').value = firma;
  document.getElementById('sh-cari-drop').className = 'hidden';
}

function clearSahaForm() {
  document.getElementById('sh-musteri').value = '';
  document.getElementById('sh-plaka').value = '';
  document.getElementById('sh-kalemler').innerHTML = renderSahaKalemRow(0);
  sahaKalemCount = 1;
}

function gonderSahaForm() {
  const musteri = document.getElementById('sh-musteri')?.value?.trim();
  if (!musteri) { alert('Lütfen müşteri/firma adı girin.'); return; }

  const rows = document.querySelectorAll('[id^="sh-kalem-"]');
  const kalemler = [];
  rows.forEach(row => {
    const aciklama = row.querySelector('.sh-kalem-aciklama')?.value?.trim();
    const miktar = parseFloat(row.querySelector('.sh-kalem-miktar')?.value) || 0;
    const birim = row.querySelector('.sh-kalem-birim')?.value || 'adet';
    const stokId = parseInt(row.querySelector('.sh-kalem-aciklama')?.dataset?.stokId) || null;
    const kod = row.querySelector('.sh-kalem-aciklama')?.dataset?.kod || '';
    if (aciklama && miktar > 0) kalemler.push({aciklama, miktar, birim, stokId, kod});
  });

  if (kalemler.length === 0) { alert('En az bir ürün ekleyin.'); return; }

  const form = {
    id: Date.now(),
    tarih: document.getElementById('sh-tarih')?.value || today(),
    musteri,
    plaka: document.getElementById('sh-plaka')?.value || '',
    not: '',
    olusturan: state.user.ad,
    kalemler,
    durum: 'bekliyor',
    olusturmaTarih: new Date().toISOString(),
  };

  state.sahaFormlar.push(form);
  save();
  if (SB_CONFIGURED()) sbSaveSahaForm(form);
  alert(`✅ Form gönderildi! ${kalemler.length} kalem — "${musteri}" — yönetici onayı bekliyor.`);
  clearSahaForm();
  render();
}

          <label style="font-size:12px;font-weight:500;display:block;margin-bottom:4px">📝 Yönetici Notu (irsaliye / ek bilgi):</label>

    ${onaylananlar.length > 0 ? `

            <td class="mono">${f.sipNo||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>` : ''}
  </div>`;
}

function sonSatisFiyat(aciklama, stokId) {
  // Geçmiş siparişlerden bu ürünün son satış fiyatını bul
  for (let i = state.siparisler.length - 1; i >= 0; i--) {
    const sip = state.siparisler[i];
    const kalem = (sip.kalemler||[]).find(k => k.aciklama === aciklama);
    if (kalem && kalem.birimFiyat > 0) return kalem.birimFiyat;
  }
  // Stok kaydında fiyat varsa onu kullan
  if (stokId) {
    const s = state.stok.find(x => x.id === stokId);
    if (s && s.fiyat > 0) return s.fiyat;
  }
  return null;
}

function hesaplaOnayToplam(formId) {
  const f = state.sahaFormlar.find(x => x.id === formId);
  if (!f) return;
  let ara = 0;
  f.kalemler.forEach((k, ki) => {
    const fiyatEl = document.getElementById(`onay-fiyat-${formId}-${ki}`);
    const topEl = document.getElementById(`onay-top-${formId}-${ki}`);
    const fiyat = parseFloat(fiyatEl?.value) || 0;
    const top = fiyat * k.miktar;
    ara += top;
    if (topEl) topEl.textContent = top > 0 ? fmt(top) + ' ₺' : '—';
  });
  const kdvOran = parseInt(document.getElementById(`onay-kdv-${formId}`)?.value) || 20;
  const kdv = ara * kdvOran / 100;
  const genel = ara + kdv;
  const ozetEl = document.getElementById(`onay-ozet-${formId}`);
  if (ozetEl && ara > 0) {
    ozetEl.innerHTML = `Ara: <b>${fmt(ara)} ₺</b> + KDV: <b>${fmt(kdv)} ₺</b> = <b style="color:var(--g600)">${fmt(genel)} ₺</b>`;
  }
}

function onaylaSahaForm(formId) {
  const f = state.sahaFormlar.find(x => x.id === formId);
  if (!f) return;
  const kdvOran = parseInt(document.getElementById(`onay-kdv-${formId}`)?.value) || 20;
  const kalemler = [];
  let ara = 0;
  f.kalemler.forEach((k, ki) => {
    const fiyat = parseFloat(document.getElementById(`onay-fiyat-${formId}-${ki}`)?.value) || 0;
    const top = fiyat * k.miktar;
    ara += top;
    kalemler.push({...k, birimFiyat: fiyat, toplam: top});
  });
  if (ara === 0) { alert('Lütfen en az bir ürüne fiyat girin.'); return; }
  const kdv = ara * kdvOran / 100;
  const genel = ara + kdv;
  const sipNo = genSipNo();
  const yoneticiNot = document.getElementById(`onay-not-${formId}`)?.value?.trim() || '';

  // Sipariş oluştur
  const sip = {
    id: Date.now(),
    no: sipNo,
    tarih: f.tarih,
    musteri: f.musteri,
    tip: 'Kurumsal',
    vergiDairesi: '', vergiNo: '',
    plaka: f.plaka,
    olusturan: f.olusturan,
    irsaliyeTarih: f.tarih, irsaliyeNo: '',
    kalemler, ara, kdv, genel, kdvOran,
    notlar: yoneticiNot,
    durum: 'tamamlandi',
  };

  // Stoktan düş
  kalemler.forEach(k => {
    const stokItem = k.stokId
      ? state.stok.find(s => s.id === k.stokId)
      : state.stok.find(s => s.aciklama === k.aciklama);
    if (stokItem) {
      stokItem.stok = (stokItem.stok || 0) - k.miktar;
      const log = JSON.parse(localStorage.getItem('env_cikis_log') || '[]');
      log.push({tarih: f.tarih, stokId: stokItem.id, kod: stokItem.kod, aciklama: stokItem.aciklama, birim: k.birim, miktar: k.miktar, musteri: f.musteri, sipNo, personel: f.olusturan});
      localStorage.setItem('env_cikis_log', JSON.stringify(log));
    }
  });

  state.siparisler.push(sip);
  f.durum = 'onaylandi';
  f.sipNo = sipNo;
  f.onayTarih = today();
  save();
  if (SB_CONFIGURED()) { sbSaveSiparis(sip); sbSaveSahaForm(f); }
  alert(`✅ Onaylandı! Sipariş No: ${sipNo}\nStok güncellendi.`);
  render();
}

function reddetSahaForm(formId) {
  if (!confirm('Bu formu reddetmek istediğinizden emin misiniz?')) return;
  const f = state.sahaFormlar.find(x => x.id === formId);
  if (f) { f.durum = 'reddedildi'; f.redTarih = today(); }
  save();
  render();
}

function geriAlSahaForm(formId) {
  if (!confirm('Formu geri alıp silmek istiyor musunuz?')) return;
  state.sahaFormlar = state.sahaFormlar.filter(x => x.id !== formId);
  save();
  render();
}

function duzeltSahaForm(formId) {
  const f = state.sahaFormlar.find(x => x.id === formId);
  if (!f) return;
  // Formu geri al ve formu düzenleme moduna yükle
  state.sahaFormlar = state.sahaFormlar.filter(x => x.id !== formId);
  save();
  render();
  // Formu ekrana doldur
  setTimeout(() => {
    const musteriEl = document.getElementById('sh-musteri');
    const plakaEl = document.getElementById('sh-plaka');
    const tarihEl = document.getElementById('sh-tarih');
    if (musteriEl) musteriEl.value = f.musteri;
    if (plakaEl) plakaEl.value = f.plaka || '';
    if (tarihEl) tarihEl.value = f.tarih;
    // Kalemleri doldur
    const cont = document.getElementById('sh-kalemler');
    if (cont && f.kalemler?.length > 0) {
      cont.innerHTML = '';
      f.kalemler.forEach((k, i) => {
        const div = document.createElement('div');
        div.innerHTML = renderSahaKalemRow(i);
        const row = div.firstElementChild;
        cont.appendChild(row);
        const inp = row.querySelector('.sh-kalem-aciklama');
        inp.value = k.aciklama;
        inp.dataset.stokId = k.stokId || '';
        inp.dataset.kod = k.kod || '';
        const mik = row.querySelector('.sh-kalem-miktar');
        mik.value = k.miktar;
        const bir = row.querySelector('.sh-kalem-birim');
        bir.value = k.birim || 'adet';
      });
      sahaKalemCount = f.kalemler.length;
    }
  }, 100);
}

let kalemCount = 1;
function renderKalemRow(i) {
  return `<div id="kalem-${i}" style="display:grid;grid-template-columns:3fr 1fr 1fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px">
    <div>
      <input type="text" class="kalem-aciklama" placeholder="Ürün açıklaması..." oninput="filterKalemDropdown(${i})" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px">
      <div id="kdrop-${i}" class="hidden" style="border:1px solid var(--border);border-radius:6px;max-height:160px;overflow-y:auto;background:#fff;position:absolute;z-index:100;width:280px"></div>
    </div>
    <input type="number" class="kalem-miktar" placeholder="Miktar" min="0" value="1" oninput="calcTotals()" style="padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;width:100%">
    <select class="kalem-birim" style="padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;width:100%">
      ${BIRIMLER.map(b => `<option>${b}</option>`).join('')}
    </select>
    <input type="number" class="kalem-fiyat" placeholder="Birim Fiyat" min="0" oninput="calcTotals()" style="padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;width:100%">
    <input type="text" class="kalem-toplam" readonly placeholder="Toplam" style="padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--gr50);width:100%;font-family:'IBM Plex Mono',monospace">
    <button onclick="removeKalem(${i})" style="background:var(--r50);border:1px solid var(--r100);border-radius:5px;padding:5px 8px;cursor:pointer;color:var(--r600);font-size:13px">✕</button>
  </div>`;
}

function addKalemRow() {
  const cont = document.getElementById('sip-kalemler');
  const div = document.createElement('div');
  div.innerHTML = renderKalemRow(kalemCount++);
  cont.appendChild(div.firstElementChild);
}

function removeKalem(i) {
  const el = document.getElementById('kalem-'+i);
  if (el) el.remove();
  calcTotals();
}

function filterKalemDropdown(i) {
  const input = document.querySelector(`#kalem-${i} .kalem-aciklama`);
  const q = input.value.toLowerCase();
  const drop = document.getElementById('kdrop-'+i);
  if (q.length < 2) { drop.className = 'hidden'; return; }
  const matches = state.stok.filter(s => s.kod.toLowerCase().includes(q) || s.aciklama.toLowerCase().includes(q)).slice(0,8);
  if (matches.length === 0) { drop.className = 'hidden'; return; }
  drop.className = '';
  drop.innerHTML = matches.map(s => `
    <div onclick="selectKalemItem(${i},'${s.aciklama.replace(/'/g,"\\'")}',${s.fiyat||0})" style="padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f4ee" onmouseover="this.style.background='#f8faf6'" onmouseout="this.style.background=''">
      ${s.aciklama.slice(0,50)} ${s.fiyat ? `<span style="color:var(--muted)">${fmt(s.fiyat)}₺</span>` : ''}
    </div>`).join('');
}

function selectKalemItem(i, aciklama, fiyat) {
  const row = document.getElementById('kalem-'+i);
  row.querySelector('.kalem-aciklama').value = aciklama;
  document.getElementById('kdrop-'+i).className = 'hidden';
  if (fiyat) row.querySelector('.kalem-fiyat').value = fiyat;
  calcTotals();
}

function calcTotals() {
  const rows = document.querySelectorAll('[id^="kalem-"]');
  let ara = 0;
  rows.forEach(row => {
    const m = parseFloat(row.querySelector('.kalem-miktar')?.value) || 0;
    const f = parseFloat(row.querySelector('.kalem-fiyat')?.value) || 0;
    const t = m * f;
    const tEl = row.querySelector('.kalem-toplam');
    if (tEl) tEl.value = t > 0 ? fmt(t) : '';
    ara += t;
  });
  const kdvOran = parseInt(document.getElementById('sip-kdv')?.value) || 20;
  const kdv = ara * kdvOran / 100;
  const genel = ara + kdv;
  const totEl = document.getElementById('sip-totals');
  if (totEl) totEl.innerHTML = `
    <div class="sip-totals">
      <div class="sip-total-row"><span>Ara Toplam</span><span class="mono">${fmt(ara)} ₺</span></div>
      <div class="sip-total-row"><span>KDV (%${kdvOran})</span><span class="mono">${fmt(kdv)} ₺</span></div>
      <div class="sip-total-row bold"><span>Genel Toplam</span><span class="mono">${fmt(genel)} ₺</span></div>
    </div>`;
}

function saveSiparis() {
  const musteri = document.getElementById('sip-musteri')?.value?.trim();
  if (!musteri) { alert('Lütfen müşteri adı girin.'); return; }
  const rows = document.querySelectorAll('[id^="kalem-"]');
  const kalemler = [];
  let ara = 0;
  rows.forEach(row => {
    const aciklama = row.querySelector('.kalem-aciklama')?.value?.trim();
    const miktar = parseFloat(row.querySelector('.kalem-miktar')?.value) || 0;
    const birim = row.querySelector('.kalem-birim')?.value || 'adet';
    const birimFiyat = parseFloat(row.querySelector('.kalem-fiyat')?.value) || 0;
    const toplam = miktar * birimFiyat;
    if (aciklama && miktar > 0) {
      kalemler.push({aciklama, miktar, birim, birimFiyat, toplam});
      ara += toplam;
    }
  });
  if (kalemler.length === 0) { alert('En az bir kalem ekleyin.'); return; }
  const kdvOran = parseInt(document.getElementById('sip-kdv')?.value) || 20;
  const kdv = ara * kdvOran / 100;
  const genel = ara + kdv;

  const editId = state._editingSipId;
  if (editId) {
    // Düzenleme modu — mevcut siparişi güncelle
    const idx = state.siparisler.findIndex(x => x.id === editId);
    if (idx >= 0) {
      state.siparisler[idx] = {
        ...state.siparisler[idx],
        tarih: document.getElementById('sip-tarih')?.value || today(),
        musteri,
        tip: document.getElementById('sip-tip')?.value || 'Bireysel',
        vergiDairesi: document.getElementById('sip-vd')?.value || '',
        vergiNo: document.getElementById('sip-vno')?.value || '',
        plaka: document.getElementById('sip-plaka')?.value || '',
        olusturan: document.getElementById('sip-personel')?.value || state.user.ad,
        irsaliyeTarih: document.getElementById('sip-irsaliye-tarih')?.value || today(),
        irsaliyeNo: document.getElementById('sip-irsaliye-no')?.value || '',
        kalemler, ara, kdv, genel, kdvOran,
        notlar: document.getElementById('sip-notlar')?.value || '',
      };
    }
    state._editingSipId = null;
    save();
    alert(`✅ Sipariş güncellendi!`);
    goPage('siparisler');
    return;
  }

  const sip = {
    id: Date.now(),
    no: genSipNo(),
    tarih: document.getElementById('sip-tarih')?.value || today(),
    musteri,
    tip: document.getElementById('sip-tip')?.value || 'Bireysel',
    vergiDairesi: document.getElementById('sip-vd')?.value || '',
    vergiNo: document.getElementById('sip-vno')?.value || '',
    plaka: document.getElementById('sip-plaka')?.value || '',
    olusturan: document.getElementById('sip-personel')?.value || state.user.ad,
    irsaliyeTarih: document.getElementById('sip-irsaliye-tarih')?.value || today(),
    irsaliyeNo: document.getElementById('sip-irsaliye-no')?.value || '',
    kalemler, ara, kdv, genel, kdvOran,
    notlar: document.getElementById('sip-notlar')?.value || '',
    durum: 'tamamlandi',
  };
  state.siparisler.push(sip);
  // Stoktan otomatik düş
  kalemler.forEach(k => {
    const stokItem = state.stok.find(s => s.aciklama === k.aciklama || s.kod === k.aciklama);
    if (stokItem) {
      stokItem.stok = (stokItem.stok || 0) - k.miktar;
      const log = JSON.parse(localStorage.getItem('env_cikis_log') || '[]');
      log.push({tarih: sip.tarih, stokId: stokItem.id, kod: stokItem.kod, aciklama: stokItem.aciklama, birim: k.birim, miktar: k.miktar, musteri: sip.musteri, sipNo: sip.no, personel: sip.olusturan});
      localStorage.setItem('env_cikis_log', JSON.stringify(log));
    }
  });
  save();
  alert(`✅ Sipariş ${sip.no} kaydedildi!`);
  goPage('siparisler');
}

function renderAylikOzet() {
  const isYonetici = state.user.rol === 'yonetici';
  const aylar = {};
  state.siparisler.forEach(s => {
    const ay = s.tarih ? s.tarih.slice(0,7) : 'Bilinmiyor';
    if (!aylar[ay]) aylar[ay] = {ciro:0, adet:0, kdv:0};
    aylar[ay].ciro += s.ara || 0;
    aylar[ay].kdv += s.kdv || 0;
    aylar[ay].adet++;
  });
  const sorted = Object.entries(aylar).sort((a,b) => b[0].localeCompare(a[0]));
  return `
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Ay</th><th>Sipariş Adedi</th>${isYonetici ? '<th>KDV Hariç Ciro</th><th>KDV</th><th>KDV Dahil Ciro</th>' : ''}</tr></thead>
      <tbody>
        ${sorted.map(([ay,d]) => `<tr>
          <td><b>${ay}</b></td>
          <td class="mono">${d.adet}</td>
          ${isYonetici ? `<td class="mono">${fmt(d.ciro)} ₺</td><td class="mono">${fmt(d.kdv)} ₺</td><td class="mono"><b>${fmt(d.ciro+d.kdv)} ₺</b></td>` : ''}

      </tbody>
    </table>
  </div>`;
}

function renderKatRapor() {
  const cats = {};
  state.siparisler.forEach(s => {
    (s.kalemler||[]).forEach(k => {
      const stokItem = state.stok.find(x => x.aciklama === k.aciklama);
      const kat = stokItem?.kategori || 'Diğer';
      if (!cats[kat]) cats[kat] = {tutar:0, adet:0};
      cats[kat].tutar += k.toplam || 0;
      cats[kat].adet += k.miktar || 0;
    });
  });
  const sorted = Object.entries(cats).sort((a,b) => b[1].tutar - a[1].tutar);
  const max = sorted[0]?.[1]?.tutar || 1;
  return `
  <div class="bar-chart" style="margin-bottom:20px">
    ${sorted.map(([k,d]) => `
      <div class="bar-row">
        <div class="bar-label">${k}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.tutar/max*100)}%"></div></div>
        <div class="bar-val">${fmtI(d.tutar)}₺</div>
      </div>`).join('')}
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Kategori</th><th>Toplam Tutar</th><th>Toplam Miktar</th></tr></thead>
      <tbody>
        ${sorted.map(([k,d]) => `<tr><td>${k}</td><td class="mono">${fmt(d.tutar)} ₺</td><td class="mono">${fmtI(d.adet)}</td></tr>`).join('')}
        ${sorted.length===0?'<tr><td colspan="3" class="text-muted text-sm" style="text-align:center;padding:20px">Veri yok</td></tr>':''}
      </tbody>
    </table>
  </div>`;
}

function renderPersonelRapor() {
  const pers = {};
  state.siparisler.forEach(s => {
    const p = s.olusturan || 'Bilinmiyor';
    if (!pers[p]) pers[p] = {ciro:0, adet:0};
    pers[p].ciro += s.genel || 0;
    pers[p].adet++;

  const sorted = Object.entries(pers).sort((a,b) => b[1].ciro - a[1].ciro);
  return `
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Personel</th><th>Sipariş Sayısı</th><th>Toplam Ciro</th></tr></thead>

      </tbody>
    </table>
  </div>`;
}

function renderUrunRapor() {
  const urunler = {};
  state.siparisler.forEach(s => {
    (s.kalemler||[]).forEach(k => {
      const key = k.aciklama;
      if (!urunler[key]) urunler[key] = {tutar:0, miktar:0, adet:0};
      urunler[key].tutar += k.toplam || 0;
      urunler[key].miktar += k.miktar || 0;
      urunler[key].adet++;

  });
  const sorted = Object.entries(urunler).sort((a,b) => b[1].tutar - a[1].tutar).slice(0,30);

    <table>
      <thead><tr><th>Ürün</th><th>Satış Adedi</th><th>Toplam Miktar</th><th>Toplam Tutar</th></tr></thead>

        </tr>`).join('')}
        ${sorted.length===0?'<tr><td colspan="4" class="text-muted text-sm" style="text-align:center;padding:20px">Veri yok</td></tr>':''}
      </tbody>
    </table>
  </div>`;
}

function renderKategoriListesi() {
  return KATEGORILER.map((k, i) => `

    </div>`).join('');
}

function addKategori() {
  const name = prompt('Yeni kategori adı:');
  if (!name || !name.trim()) return;
  KATEGORILER.push(name.trim());
  saveKategoriler();
  render();
}

function updateKategori(i) {
  const val = document.getElementById('kat-'+i)?.value?.trim();
  if (!val) return;
  const old = KATEGORILER[i];
  KATEGORILER[i] = val;
  // Stok ürünlerini güncelle
  state.stok.forEach(s => { if (s.kategori === old) s.kategori = val; });
  saveKategoriler();
  save();
  alert(`✅ "${old}" → "${val}" olarak güncellendi.`);
  render();
}

function deleteKategori(i) {
  const kat = KATEGORILER[i];
  const kullanan = state.stok.filter(s => s.kategori === kat).length;
  if (!confirm(`"${kat}" kategorisini silmek istiyor musunuz?\n${kullanan > 0 ? kullanan + ' ürün bu kategoride, "Sarf Malzeme" olarak taşınacak.' : ''}`)) return;
  if (kullanan > 0) state.stok.forEach(s => { if (s.kategori === kat) s.kategori = 'Sarf Malzeme'; });
  KATEGORILER.splice(i, 1);
  saveKategoriler();
  save();
  render();
}

function saveUser(id) {
  const u = USERS.find(x => x.id === id);
  if (!u) return;
  u.ad = document.getElementById('u-ad-'+id).value.trim() || u.ad;
  u.kullanici = document.getElementById('u-kul-'+id).value.trim() || u.kullanici;
  u.sifre = document.getElementById('u-sif-'+id).value.trim() || u.sifre;
  u.rol = document.getElementById('u-rol-'+id).value;
  saveUsers();
  // Eğer giriş yapan kişiyse state'i güncelle
  if (state.user && state.user.id === id) state.user = {...state.user, ...u};
  alert(`✅ ${u.ad} güncellendi.`);
  render();
}

async function fetchKur() {
  const el = document.getElementById('kur-status');
  if (el) { el.className = 'alert alert-warn'; el.textContent = '⏳ Kur çekiliyor...'; }
  // CORS açık, ücretsiz döviz API'leri - sırayla dene
  const sources = [
    async () => {
      const r = await fetch('https://open.er-api.com/v6/latest/TRY', {signal: AbortSignal.timeout(6000)});
      const d = await r.json();
      if (d.result !== 'success') throw new Error('API hatası');
      // TRY bazlı: 1 TRY = X USD anlamına gelir, biz TL/USD istiyoruz
      const usd = Math.round((1 / d.rates.USD) * 10000) / 10000;
      const eur = Math.round((1 / d.rates.EUR) * 10000) / 10000;
      return {usd, eur, kaynak: 'ExchangeRate-API'};
    },
    async () => {
      const r = await fetch('https://api.frankfurter.app/latest?from=USD,EUR&to=TRY', {signal: AbortSignal.timeout(6000)});
      const d = await r.json();
      // Bu API her base için TRY değeri verir
      const r2 = await fetch('https://api.frankfurter.app/latest?from=USD&to=TRY', {signal: AbortSignal.timeout(6000)});
      const r3 = await fetch('https://api.frankfurter.app/latest?from=EUR&to=TRY', {signal: AbortSignal.timeout(6000)});
      const d2 = await r2.json();
      const d3 = await r3.json();
      return {usd: d2.rates.TRY, eur: d3.rates.TRY, kaynak: 'Frankfurter'};
    },
  ];

  for (const tryFn of sources) {
    try {
      const {usd, eur, kaynak} = await tryFn();
      if (usd > 1 && eur > 1) {
        state.kur.usd = Math.round(usd * 10000) / 10000;
        state.kur.eur = Math.round(eur * 10000) / 10000;
        save();
        const usdEl = document.getElementById('k-usd');
        const eurEl = document.getElementById('k-eur');
        if (usdEl) usdEl.value = state.kur.usd;
        if (eurEl) eurEl.value = state.kur.eur;
        if (el) { el.className = 'alert alert-success'; el.textContent = `✅ ${kaynak} — ${new Date().toLocaleTimeString('tr-TR')} — USD: ${state.kur.usd} ₺ | EUR: ${state.kur.eur} ₺`; }
        render();
        return;
      }
    } catch(e) { continue; }
  }

function handleStokExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('stok-upload-status');
  if (statusEl) { statusEl.className = 'alert alert-warn'; statusEl.textContent = '⏳ Dosya okunuyor...'; }

  if (typeof XLSX === 'undefined') {
    if (statusEl) { statusEl.className = 'alert alert-danger'; statusEl.textContent = '❌ Excel kütüphanesi henüz yüklenmedi, birkaç saniye bekleyip tekrar deneyin.'; }
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type: 'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header: 1, defval: ''});

      // Format: [boş, Stok Kodu, Açıklama, Miktar]
      const yeniStok = [];
      let basarili = 0, atlandi = 0;

      rows.forEach((row, ri) => {
        if (ri === 0) return; // başlık satırı atla
        const kod = String(row[1] || '').trim();
        const aciklama = String(row[2] || '').trim();
        const stok = parseFloat(String(row[3] || '0').replace(',', '.')) || 0;
        if (!kod && !aciklama) { atlandi++; return; }
        if (!kod || !aciklama) { atlandi++; return; }

        // Mevcut stoktan kategori, minStok, birim, fiyat bilgilerini koru
        const existing = state.stok.find(s => s.kod === kod);
        yeniStok.push({
          id: ri,
          kod,
          aciklama,
          stok,
          kategori: existing?.kategori || autoKategori(kod, aciklama),
          minStok: existing?.minStok || 5,
          birim: existing?.birim || 'adet',
          fiyat: existing?.fiyat || 0,
        });
        basarili++;
      });

      if (basarili === 0) {
        if (statusEl) { statusEl.className = 'alert alert-danger'; statusEl.textContent = '❌ Hiç ürün okunamadı. Sütun sırası: Boş | Stok Kodu | Açıklama | Miktar olmalı.'; }
        return;
      }

      const onay = confirm(`📊 Excel'den ${basarili} ürün okundu.\n${atlandi > 0 ? atlandi + ' satır atlandı (boş).\n' : ''}Mevcut stok tamamen değiştirilsin mi?`);
      if (!onay) {
        if (statusEl) { statusEl.className = 'alert alert-warn'; statusEl.textContent = '⚠️ İptal edildi.'; }
        event.target.value = '';
        return;
      }

      state.stok = yeniStok;
      save();
      if (statusEl) { statusEl.className = 'alert alert-success'; statusEl.textContent = `✅ ${basarili} ürün başarıyla yüklendi! Mevcut kategoriler ve ayarlar korundu.`; }
      // Input'u temizle
      event.target.value = '';
      render();
    } catch(err) {
      if (statusEl) { statusEl.className = 'alert alert-danger'; statusEl.textContent = '❌ Dosya okunamadı: ' + err.message; }
    }
  };
  reader.readAsArrayBuffer(file);
}

function autoKategori(kod, aciklama) {
  const a = (aciklama || '').toUpperCase();
  if (['KIMYA','HIPOKLORIT','KLOR','POLIELEKTRO','SODYUM','ANTRASIT','DOLOMIT','KUM DOLGU','KARBON DOLGU','RECINE','PUROLITE','SILIFOZ','ARSENIK','ODORIENT','BAKTERI','KOKU GIDER','SERTLIK'].some(x => a.includes(x))) return 'Kimyasal';
  if (['TABLET TUZ','TUZ EMIS','TUZ HAZNE'].some(x => a.includes(x))) return 'Tuz';
  if (['BLOWER','DIFIZOR','DIFUZOR','HAVALANDIRMA','ARITMA','DALGIC','ELEKTROD PH','SENSOR ELEKTROD','ORP','FLATOR','SAMANDIRA'].some(x => a.includes(x))) return 'Atıksu';
  if (['KABLO','KLEMENS','SIGORTA','KONTAKTOR','SALTER','ROLE','TRIFAZE','SINYAL','DAGITIM UNITESI','PRIZ','TOPRAKLAMA','YUKSUK','SURUCU','TMS','INVERTOR','GUNES PANEL','TRAFO','BOBIN','AKU'].some(x => a.includes(x))) return 'Endüstriyel';
  if (['TARO','SEBIL'].some(x => a.includes(x))) return 'TARO';
  if (['MEMBRAN','POMPA RO','ATIK KISICI','FILTRE','HOUSING','KARTUS','BRAKET','MINERAL FILTRE','SEDIMENT','GAC','CTO','UV CIHAZ','LAMBA UV','YUMUSATMA','VALF CLACK'].some(x => a.includes(x))) return 'Housing';
  return 'Sarf Malzeme';
}

function saveStokItem(id) {
  const kod = document.getElementById('m-kod').value.trim();
  const aciklama = document.getElementById('m-acik').value.trim();
  if (!kod || !aciklama) { alert('Kod ve açıklama zorunludur.'); return; }
  const data = {
    kod, aciklama,
    kategori: document.getElementById('m-kat').value,
    stok: parseFloat(document.getElementById('m-stok').value) || 0,
    minStok: parseFloat(document.getElementById('m-min').value) || 5,
    birim: document.getElementById('m-birim').value,
    fiyat: parseFloat(document.getElementById('m-fiyat').value) || 0,
  };
  if (id) {
    const idx = state.stok.findIndex(x => x.id === id);
    if (idx >= 0) state.stok[idx] = {...state.stok[idx], ...data};
  } else {
    const maxId = Math.max(...state.stok.map(x => x.id), 0);
    state.stok.push({...data, id: maxId+1});
  }
  save();
  state.modal = null;
  render();
}

function downloadXLSX(rows, filename) {
  if (typeof XLSX === 'undefined') {
    // Kütüphane henüz yüklenmedi, 1 saniye bekle ve tekrar dene
    setTimeout(() => {
      if (typeof XLSX !== 'undefined') {
        _doDownloadXLSX(rows, filename);
      } else {
        // Son çare: CSV olarak indir
        const BOM = '\uFEFF';
        const csv = BOM + rows.map(r => r.map(c => {
          const v = (c && typeof c === 'object' && 'v' in c) ? c.v : c;
          return '"' + String(v == null ? '' : v).replace(/"/g,'""') + '"';
        }).join(',')).join('\r\n');
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none'; a.href = url;
        a.download = filename.replace('.xlsx','.csv');
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
      }
    }, 1200);
    return;
  }
  _doDownloadXLSX(rows, filename);
}

function _doDownloadXLSX(rows, filename) {
  // rows içinde {v, t, z} objeleri olabilir (hücre formatı)
  const plainRows = rows.map(r => r.map(c => (c && typeof c === 'object' && 'v' in c) ? c.v : c));
  const ws = XLSX.utils.aoa_to_sheet(plainRows);
  // Format bilgilerini uygula
  rows.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      if (cell && typeof cell === 'object' && 'z' in cell) {
        const addr = XLSX.utils.encode_cell({r: ri, c: ci});
        if (ws[addr]) ws[addr].z = cell.z;
      }
    });
  });
  const colWidths = rows[0] ? rows[0].map((_,i) => ({
    wch: Math.min(50, Math.max(10, ...rows.map(r => {
      const v = (r[i] && typeof r[i] === 'object' && 'v' in r[i]) ? r[i].v : r[i];
      return String(v||'').length;
    })))
  })) : [];
  ws['!cols'] = colWidths;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Veri');
  XLSX.writeFile(wb, filename);
}

}

          ${filtered.map(c => {
            const toplamAlim = state.siparisler.filter(s => s.musteri === c.firma).reduce((t,s) => t + (s.genel||0), 0);
            return `<tr>
              <td><b>${c.firma}</b>${c.adres ? `<br><span class="text-sm text-muted">${c.adres.slice(0,40)}</span>` : ''}</td>
              <td><span class="badge badge-gray">${c.tip||'Bireysel'}</span></td>
              <td>${c.vergiDairesi||'—'}</td>
              <td class="mono">${c.vergiNo||'—'}</td>
              <td>${c.telefon||'—'}</td>
              <td>${c.ilgili||'—'}</td>
              <td class="mono">${toplamAlim > 0 ? fmt(toplamAlim)+' ₺' : '—'}</td>
              <td>
                <button class="btn btn-secondary btn-sm btn-icon" onclick="openCariModal(${c.id})" title="Düzenle">✏️</button>
                <button class="btn btn-sm btn-icon" style="color:var(--danger);background:var(--r50);border:1px solid var(--r100)" onclick="delCari(${c.id})" title="Sil">🗑️</button>
              </td>
            </tr>`;
          }).join('')}
          ${filtered.length === 0 ? '<tr><td colspan="8" class="text-muted text-sm" style="text-align:center;padding:24px">Cari bulunamadı. "+ Yeni Cari" ile ekleyin.</td></tr>' : ''}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderCariModal() {
  const id = state.cariModal;
  const isEdit = id !== null && id !== 'new';
  const c = isEdit ? (state.cariler.find(x => x.id === id) || {}) : {};
  return `<div class="modal-overlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title">${isEdit ? 'Cari Düzenle' : 'Yeni Cari Ekle'}</div>
        <button class="modal-close" onclick="closeCariModal()">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group">
            <label>Firma Unvanı / Ad Soyad *</label>
            <input type="text" id="cr-firma" value="${c.firma||''}">
          </div>
          <div class="form-group">
            <label>Tür</label>
            <select id="cr-tip">
              <option ${(c.tip||'Bireysel')==='Bireysel'?'selected':''}>Bireysel</option>
              <option ${c.tip==='Kurumsal'?'selected':''}>Kurumsal</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Adres</label>
          <textarea id="cr-adres" rows="2">${c.adres||''}</textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Vergi Dairesi</label>
            <input type="text" id="cr-vd" value="${c.vergiDairesi||''}">
          </div>
          <div class="form-group">
            <label>Vergi No / TC No</label>
            <input type="text" id="cr-vno" value="${c.vergiNo||''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Telefon</label>
            <input type="text" id="cr-tel" value="${c.telefon||''}" placeholder="0532 xxx xx xx">
          </div>
          <div class="form-group">
            <label>E-posta</label>
            <input type="email" id="cr-mail" value="${c.eposta||''}">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>İlgili Kişi</label>
            <input type="text" id="cr-ilgili" value="${c.ilgili||''}">
          </div>
          <div class="form-group">
            <label>İlgili Kişi Telefonu</label>
            <input type="text" id="cr-ilgili-tel" value="${c.ilgiliTel||''}">
          </div>
        </div>
        <div class="form-group">
          <label>Notlar</label>
          <textarea id="cr-not" rows="2">${c.notlar||''}</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCariModal()">İptal</button>
        <button class="btn btn-primary" onclick="saveCari(${isEdit?c.id:'null'})">${isEdit?'Güncelle':'Ekle'}</button>
      </div>
    </div>
  </div>`;
}

function openCariModal(id) {
  state.cariModal = id === null ? 'new' : id;
  render();
}
function closeCariModal() { state.cariModal = null; render(); }

function saveCari(id) {
  const firma = document.getElementById('cr-firma').value.trim();
  if (!firma) { alert('Firma adı zorunludur.'); return; }
  const data = {
    firma,
    tip: document.getElementById('cr-tip').value,
    adres: document.getElementById('cr-adres').value.trim(),
    vergiDairesi: document.getElementById('cr-vd').value.trim(),
    vergiNo: document.getElementById('cr-vno').value.trim(),
    telefon: document.getElementById('cr-tel').value.trim(),
    eposta: document.getElementById('cr-mail').value.trim(),
    ilgili: document.getElementById('cr-ilgili').value.trim(),
    ilgiliTel: document.getElementById('cr-ilgili-tel').value.trim(),
    notlar: document.getElementById('cr-not').value.trim(),
  };
  if (id && id !== 'null') {
    const idx = state.cariler.findIndex(x => x.id === id);
    if (idx >= 0) state.cariler[idx] = {...state.cariler[idx], ...data};
  } else {
    const maxId = Math.max(...state.cariler.map(x => x.id), 0);
    state.cariler.push({...data, id: maxId+1});
  }
  save();
  state.cariModal = null;
  render();
}

function delCari(id) {
  if (!confirm('Bu cariyi silmek istediğinizden emin misiniz?')) return;
  state.cariler = state.cariler.filter(x => x.id !== id);
  save();
  render();
}

function exportCariExcel() {
  const rows = [['Firma / Kişi','Tür','Adres','Vergi Dairesi','Vergi / TC No','Telefon','E-posta','İlgili Kişi','İlgili Tel','Notlar','Toplam Alım (₺)']];
  state.cariler.forEach(c => {
    const toplamAlim = state.siparisler.filter(s => s.musteri === c.firma).reduce((t,s) => t + (s.genel||0), 0);
    rows.push([c.firma, c.tip||'', c.adres||'', c.vergiDairesi||'', c.vergiNo||'', c.telefon||'', c.eposta||'', c.ilgili||'', c.ilgiliTel||'', c.notlar||'', toplamAlim]);
  });
  downloadXLSX(rows, 'ENV_Cariler_' + today() + '.xlsx');
}

// ===== PRINT =====
function printSiparis() {
  const musteri = document.getElementById('sip-musteri')?.value || '';
  const no = document.querySelector('.sip-no')?.textContent || '';
  window.print();
}

function printSiparisId(id) {
  // Aynı exportSipId kullan — tam formatlı versiyon
  exportSipId(id);
}

function filterCariDropdown() {
  const q = document.getElementById('sip-musteri').value.toLowerCase();
  const drop = document.getElementById('sip-cari-drop');
  if (!drop) return;
  if (q.length < 1) { drop.className = 'hidden'; return; }
  const matches = state.cariler.filter(c => c.firma.toLowerCase().includes(q)).slice(0,8);
  if (matches.length === 0) { drop.className = 'hidden'; return; }
  drop.className = '';
  drop.innerHTML = matches.map(c => `
    <div onclick="selectCariForSiparis(${c.id})" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f4ee" onmouseover="this.style.background='#f8faf6'" onmouseout="this.style.background=''">
      <b>${c.firma}</b> <span style="color:var(--muted)">${c.tip||''} ${c.vergiNo ? '· '+c.vergiNo : ''}</span>
    </div>`).join('');
}

function selectCariForSiparis(id) {
  const c = state.cariler.find(x => x.id === id);
  if (!c) return;
  document.getElementById('sip-musteri').value = c.firma;
  document.getElementById('sip-cari-drop').className = 'hidden';
  if (document.getElementById('sip-tip')) document.getElementById('sip-tip').value = c.tip || 'Bireysel';
  if (document.getElementById('sip-vd')) document.getElementById('sip-vd').value = c.vergiDairesi || '';
  if (document.getElementById('sip-vno')) document.getElementById('sip-vno').value = c.vergiNo || '';
}

// ===== EVENTS & NAV =====
function goPage(p) {
  state.page = p;
  state.page_num = 1;
  if (p !== 'yeni-siparis') { kalemCount = 1; state._editingSipId = null; }
  render();
}

function doSearch(q) { state.searchQ = q; state.page_num = 1; render(); }
function doFilterKat(k) { state.filterKat = k; state.page_num = 1; render(); }
function setPage(p) { state.page_num = p; render(); }
function setTab(t) { state.activeTab = t; render(); }
function doLogout() { state.user = null; render(); }

function bindEvents() {
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('l-user')) doLogin();
  }, {once: true});
}

function saveSupabaseConfig() {
  const url = document.getElementById('sb-url')?.value?.trim();
  const key = document.getElementById('sb-key')?.value?.trim();
  if (!url || !key) { alert('URL ve Key giriniz.'); return; }
  localStorage.setItem('env_sb_url', url);
  localStorage.setItem('env_sb_key', key);
  alert('✅ Kaydedildi! Sayfa yenileniyor...');
  window.location.reload();
}

async function syncAllToSupabase() {
  if (!SB_CONFIGURED()) { alert('Önce Supabase bağlantısını yapılandırın.'); return; }
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Yükleniyor...';
  try {
    // Stok
    const stokRows = state.stok.map(item => ({
      id: item.id, kod: item.kod, aciklama: item.aciklama,
      stok: item.stok, min_stok: item.minStok, kategori: item.kategori,
      birim: item.birim, fiyat: item.fiyat, updated_at: new Date().toISOString()
    }));
    // 50'şer parçalara böl
    for (let i = 0; i < stokRows.length; i += 50) {
      await sb.from('stok').upsert(stokRows.slice(i, i+50), {onConflict:'id'});
    }
    // Siparişler
    for (const sip of state.siparisler) await sbSaveSiparis(sip);
    // Cariler
    for (const c of state.cariler) await sbSaveCari(c);
    // Saha formları
    for (const f of state.sahaFormlar) await sbSaveSahaForm(f);
    // Ayarlar
    await syncToSupabase();
    btn.textContent = '✅ Tamamlandı!';
    setTimeout(() => { btn.disabled = false; btn.textContent = '🔄 Tüm Veriyi Buluta Yükle'; }, 2000);
    alert(`✅ ${stokRows.length} stok, ${state.siparisler.length} sipariş, ${state.cariler.length} cari buluta yüklendi!`);
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔄 Tüm Veriyi Buluta Yükle';
    alert('❌ Hata: ' + e.message);
  }
}


// PWA Service Worker kaydı
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ===== INIT =====
load(); // localStorage'dan yükle (hızlı başlangıç)
initSupabase();
render();

// Supabase varsa buluttan güncelle
if (SB_CONFIGURED()) {
  loadFromSupabase().then(ok => {
    if (ok) render();
  });
}


</script>
